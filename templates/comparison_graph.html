<!-- Donut Chart Section -->
<div class="donut-chart-container">
  <h1>Carbon Footprint Breakdown</h1>
  <canvas id="donutChart"></canvas>
</div>
<script src="/static/donut_chart.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const ctx = document.getElementById('donutChart').getContext('2d');

    // Fetch data from the Flask endpoint
    fetch('/get_chart_data')
        .then(response => response.json())
        .then(data => {
            const donutChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: 'Carbon Footprint',
                        data: data.values,
                        backgroundColor: [
                            'rgba(255, 99, 132, 0.6)',  // Food
                            'rgba(54, 162, 235, 0.6)',  // Travel
                            'rgba(255, 206, 86, 0.6)',  // Electricity
                            'rgba(75, 192, 192, 0.6)'   // Waste
                        ],
                        hoverBackgroundColor: [
                            'rgba(255, 99, 132, 0.8)',
                            'rgba(54, 162, 235, 0.8)',
                            'rgba(255, 206, 86, 0.8)',
                            'rgba(75, 192, 192, 0.8)'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                font: {
                                    size: 16 // Adjusted font size for better readability
                                },
                                color: 'white' // Changed legend text color
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function (context) {
                                    const label = context.label || '';
                                    const value = context.raw || 0;
                                    return `${label}: ${value.toFixed(2)} kg CO2`;
                                }
                            }
                        }
                    },
                    layout: {
                        padding: 15 // Adjusted padding for a cleaner look
                    }
                }
            });
        })
        .catch(error => {
            console.error('Error fetching chart data:', error);
        });
  });
  
</script>
